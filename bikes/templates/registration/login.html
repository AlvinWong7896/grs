{% extends 'base.html' %}
{% load static %}


{% block content %}
    <h2>Login</h2>
    {% if form.errors %}
    <p class="error">Invalid username or password. Please try again.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock content %}
