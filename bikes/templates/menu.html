{% extends 'base.html' %}
{% load static %}
{% block content %}
<h1>Our pre-owned Bikes</h1>
<!--Begin col-->
<div class="column">
    <!-- Create for loop -->
    {% for bike in bikes %}
    <p>
        <a href="{% url 'menu_item' pk=bike.pk %}">
        {{ bike.name }}
        </a>
        <span class="menu-price">
            ${{ bike.selling_price }}.00
        </span>
    </p>
    <!-- End or Loop -->
    {% endfor %}
</div>
<!-- End col -->


{% if is_manager %}
    <div>
        <a href="{% url 'create_bike' %}">Create New Record</a>
    </div>
{% endif %}

{% endblock %}
